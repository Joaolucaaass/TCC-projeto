<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCOUT</title>
  <link rel="stylesheet" href="/css/inicial.css">
</head>
<body>

<div class="aplicativo">

  <header class="cabecalho">
    <a href="index.html" class="logo-equipe">
       <img src="/src/assets/IMG/hipica.png" alt="Logo da equipe" class="logo-equipe-img">
    </a>

    <h1 class="logo">SCOUT Hípica</h1>

    <div class="cabecalho-direita">
      <a href="login.html" class="usuario-chip" id="usuarioChip">
        <div class="usuario-avatar" id="usuarioAvatar">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <span class="usuario-nome" id="usuarioNome">Entrar</span>
      </a>

      <button class="botao-sair" id="botaoSair">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sair
      </button>
    </div>
  </header>

  <!-- CARROSSEL -->
  <div class="carrossel">
    <div class="carrossel-moldura">
      <div class="carrossel-faixa" id="carrosselFaixa">

        <div class="carrossel-slide">
          <img src="./src/assets/IMG/1.jpg" alt="Slide 1" class="slide-imagem">
        </div>

        <div class="carrossel-slide">
          <img src="./src/assets/IMG/2.jpg" alt="Slide 2" class="slide-imagem">
        </div>

        <div class="carrossel-slide">
          <img src="./src/assets/IMG/3.jpg" alt="Slide 3" class="slide-imagem">
        </div>

        <div class="carrossel-slide">
          <img src="./src/assets/IMG/4.jpg" alt="Slide 4" class="slide-imagem">
        </div>

      </div>
    </div>

    <div class="seta-carrossel seta-anterior" id="setaAnterior">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </div>
    <div class="seta-carrossel seta-proxima" id="setaProxima">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
  </div>

  <!-- PONTOS DO CARROSSEL -->
  <div class="pontos-carrossel" id="pontosCarrossel"></div>

  <!-- GRADE DE NAVEGAÇÃO -->
  <div class="grade-navegacao">

    <a href="pages/scout-live.html" class="botao-nav botao-nav--ao-vivo">
      <div class="icone-nav">
        <div class="indicador-ao-vivo"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="#e8273a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <circle cx="12" cy="12" r="4" fill="#e8273a" stroke="none"/>
        </svg>
      </div>
      <span class="rotulo-nav">Scout Live</span>
    </a>

    <a href="pages/jogos.html" class="botao-nav botao-nav--jogos">
      <div class="icone-nav">
        <img src="/src/assets/IMG/bola.png" alt="Jogos" style="width:34px; height:34px; filter: invert(1) sepia(1) saturate(5) hue-rotate(200deg);">
      </div>
      <span class="rotulo-nav">Jogos</span>
    </a>

    <a href="pages/atletas.html" class="botao-nav botao-nav--atletas">
      <div class="icone-nav">
        <img src="/src/assets/IMG/voleibol.png" alt="Atletas" style="width:34px; height:34px; filter: invert(1) sepia(1) saturate(5) hue-rotate(200deg);">
      </div>
      <span class="rotulo-nav">Atletas</span>
    </a>

    <a href="pages/perfil.html" class="botao-nav botao-nav--perfil">
      <div class="icone-nav">
        <img src="/src/assets/IMG/perfil.png" alt="Perfil" style="width:34px; height:34px; filter: invert(1) sepia(1) saturate(5) hue-rotate(200deg);">
      </div>
      <span class="rotulo-nav">Perfil</span>
    </a>

  </div>

</div>

<script src="/js/home.js"></script>
</body>
</html>
