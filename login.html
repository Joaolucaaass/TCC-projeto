<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCOUT — Entrar</title>
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="pagina">

  <!-- LADO ESQUERDO — decorativo -->
  <div class="painel-lateral">
    <div class="painel-conteudo">
      <a href="index.html" class="painel-logo">SCOUT</a>
      <div class="painel-texto">
        <h2 class="painel-titulo">Hípica de Campinas</h2>
        <p class="painel-subtitulo">Acompanhe atletas, jogos e desempenho em tempo real.</p>
      </div>
      <div class="painel-decoracao">
        <div class="circulo circulo--1"></div>
        <div class="circulo circulo--2"></div>
        <div class="circulo circulo--3"></div>
      </div>
    </div>
  </div>

  <!-- LADO DIREITO — formulário -->
  <div class="painel-formulario">
    <div class="formulario-container">

      <!-- Abas Login / Cadastro -->
      <div class="abas">
        <button class="aba aba--ativa" id="abaEntrar" onclick="trocarAba('entrar')">Entrar</button>
        <button class="aba" id="abaCadastro" onclick="trocarAba('cadastro')">Cadastrar</button>
      </div>

      <!-- FORMULÁRIO DE LOGIN -->
      <div class="bloco-formulario" id="blocoEntrar">
        <div class="formulario-topo">
          <h1 class="formulario-titulo">Bem-vindo de volta</h1>
          <p class="formulario-subtitulo">Entre com suas credenciais para continuar</p>
        </div>

        <div class="campos">
          <div class="campo">
            <label class="campo-rotulo">E-mail</label>
            <input class="campo-input" type="email" placeholder="seu@email.com" id="loginEmail">
          </div>

          <div class="campo">
            <label class="campo-rotulo">Senha</label>
            <div class="campo-senha">
              <input class="campo-input" type="password" placeholder="sua senha" id="loginSenha">
              <button class="campo-olho" onclick="toggleSenha('loginSenha', this)" type="button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <a href="#" class="campo-link">Esqueceu a senha?</a>
          </div>
        </div>

        <p class="mensagem-erro" id="erroLogin"></p>

        <button class="botao-enviar" onclick="fazerLogin()">Entrar</button>

        <p class="formulario-rodape">
          Não tem conta? <a href="#" onclick="trocarAba('cadastro')">Cadastre-se</a>
        </p>
      </div>

      <!-- FORMULÁRIO DE CADASTRO -->
      <div class="bloco-formulario oculto" id="blocoCadastro">
        <div class="formulario-topo">
          <h1 class="formulario-titulo">Criar conta</h1>
          <p class="formulario-subtitulo">Preencha os dados para se cadastrar</p>
        </div>

        <div class="campos">
          <div class="campo">
            <label class="campo-rotulo">Nome completo</label>
            <input class="campo-input" type="text" placeholder="Seu nome" id="cadastroNome">
          </div>

          <div class="campo">
            <label class="campo-rotulo">CPF</label>
            <input class="campo-input" type="text" placeholder="000.000.000-00" id="cadastroCpf" maxlength="14" oninput="mascaraCpf(this)">
          </div>

          <div class="campo">
            <label class="campo-rotulo">E-mail</label>
            <input class="campo-input" type="email" placeholder="seu@email.com" id="cadastroEmail">
          </div>

          <div class="campo">
            <label class="campo-rotulo">Senha</label>
            <div class="campo-senha">
              <input class="campo-input" type="password" placeholder="mínimo 6 caracteres" id="cadastroSenha">
              <button class="campo-olho" onclick="toggleSenha('cadastroSenha', this)" type="button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>
        </div>

        <p class="mensagem-erro" id="erroCadastro"></p>

        <button class="botao-enviar" onclick="fazerCadastro()">Criar conta</button>

        <p class="formulario-rodape">
          Já tem conta? <a href="#" onclick="trocarAba('entrar')">Entrar</a>
        </p>
      </div>

    </div>
  </div>

</div>

<script src="js/login.js"></script>
</body>
</html>
